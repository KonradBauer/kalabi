<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2218"/>
      <stop offset="50%" style="stop-color:#3d2f1e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#hero-bg)"/>
  <!-- Subtle wood grain lines -->
  <g opacity="0.08" stroke="#c9a96e" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="180"/>
    <line x1="0" y1="400" x2="1920" y2="420"/>
    <line x1="0" y1="600" x2="1920" y2="580"/>
    <line x1="0" y1="800" x2="1920" y2="820"/>
  </g>
  <!-- Furniture silhouette suggestion -->
  <rect x="600" y="400" width="720" height="400" rx="4" fill="#3d3025" opacity="0.5"/>
  <rect x="640" y="440" width="200" height="320" rx="2" fill="#4a3d2e" opacity="0.4"/>
  <rect x="880" y="440" width="200" height="320" rx="2" fill="#4a3d2e" opacity="0.4"/>
  <rect x="1120" y="500" width="160" height="260" rx="2" fill="#4a3d2e" opacity="0.4"/>
  <!-- Accent glow -->
  <rect x="0" y="0" width="1920" height="200" fill="url(#hero-accent)"/>
</svg>
