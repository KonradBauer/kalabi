<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 512">
  <defs>
    <linearGradient id="k-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3025"/>
      <stop offset="100%" style="stop-color:#2c2218"/>
    </linearGradient>
  </defs>
  <rect width="768" height="512" fill="url(#k-bg)"/>
  <!-- Kitchen counter -->
  <rect x="60" y="200" width="648" height="12" fill="#c9a96e" opacity="0.3"/>
  <!-- Cabinets -->
  <rect x="60" y="220" width="150" height="230" rx="3" fill="#4a3d2e" opacity="0.5"/>
  <rect x="230" y="220" width="150" height="230" rx="3" fill="#4a3d2e" opacity="0.4"/>
  <rect x="400" y="220" width="150" height="230" rx="3" fill="#4a3d2e" opacity="0.5"/>
  <rect x="570" y="220" width="138" height="230" rx="3" fill="#4a3d2e" opacity="0.4"/>
  <!-- Upper cabinets -->
  <rect x="60" y="40" width="200" height="140" rx="3" fill="#4a3d2e" opacity="0.35"/>
  <rect x="280" y="40" width="200" height="140" rx="3" fill="#4a3d2e" opacity="0.3"/>
  <rect x="500" y="40" width="208" height="140" rx="3" fill="#4a3d2e" opacity="0.35"/>
  <!-- Handles -->
  <g fill="#c9a96e" opacity="0.4">
    <rect x="125" y="310" width="20" height="3" rx="1"/>
    <rect x="295" y="310" width="20" height="3" rx="1"/>
    <rect x="465" y="310" width="20" height="3" rx="1"/>
    <rect x="630" y="310" width="20" height="3" rx="1"/>
