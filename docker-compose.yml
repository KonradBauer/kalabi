services:
  app:
    build:
      context: .
      network: host
      args:
        DATABASE_URL: mongodb://127.0.0.1:27017/kalabi
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:9000}
    ports:
      - '9000:3000'
    environment:
      - DATABASE_URL=mongodb://mongo:27017/kalabi
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:9000}
    volumes:
      - media_data:/app/public/media
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  media_data:
